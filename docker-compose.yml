services:
  app:
    build: .
    ports:
      - "8501:8501"
    environment:
      DATABASE_URL: postgresql://cal:cal@db:5432/cal
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: cal
      POSTGRES_PASSWORD: cal
      POSTGRES_DB: cal
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cal"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
