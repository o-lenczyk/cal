# Database credentials for external PostgreSQL.
# Replace the placeholder with your real DATABASE_URL before applying.
#
# Create/update the secret manually:
#   kubectl create secret generic cal-db-secret \
#     --from-literal=DATABASE_URL='postgresql://user:password@host:5432/cal' \
#     -n cal
#
# Or apply this file after encoding your URL:
#   echo -n 'postgresql://user:password@host:5432/cal' | base64
#   (paste result into data.DATABASE_URL below)
#
apiVersion: v1
kind: Secret
metadata:
  name: cal-db-secret
  namespace: cal
type: Opaque
stringData:
  # Use stringData to pass plain text (K8s base64-encodes it).
  # Replace with your actual connection string.
  DATABASE_URL: "postgresql://user:password@your-db-host:5432/cal"
